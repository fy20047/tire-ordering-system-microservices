services:
  mariadb-auth:
    image: mariadb:11
    container_name: tire_mariadb_auth
    environment:
      MARIADB_DATABASE: ${AUTH_DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${AUTH_DB_PORT}:3306"
    volumes:
      - mariadb_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb-tire:
    image: mariadb:11
    container_name: tire_mariadb_tire
    environment:
      MARIADB_DATABASE: ${TIRE_DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${TIRE_DB_PORT}:3306"
    volumes:
      - mariadb_tire_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb-order:
    image: mariadb:11
    container_name: tire_mariadb_order
    environment:
      MARIADB_DATABASE: ${ORDER_DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${ORDER_DB_PORT}:3306"
    volumes:
      - mariadb_order_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: tire_adminer
    ports:
      - "8081:8080"
    depends_on:
      - mariadb-auth
      - mariadb-tire
      - mariadb-order

  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    image: tire-ordering-auth-service:local
    container_name: tire_auth_service
    environment:
      DB_HOST: mariadb-auth
      DB_PORT: 3306
      DB_NAME: ${AUTH_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_EXPIRATION_SECONDS: ${JWT_REFRESH_EXPIRATION_SECONDS:-1209600}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refreshToken}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAME_SITE: ${JWT_REFRESH_COOKIE_SAME_SITE:-Lax}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mariadb-auth:
        condition: service_healthy

  tire-service:
    build:
      context: ../tire-service
      dockerfile: Dockerfile
    image: tire-ordering-tire-service:local
    container_name: tire_tire_service
    environment:
      DB_HOST: mariadb-tire
      DB_PORT: 3306
      DB_NAME: ${TIRE_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    depends_on:
      mariadb-tire:
        condition: service_healthy

  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    image: tire-ordering-order-service:local
    container_name: tire_order_service
    environment:
      DB_HOST: mariadb-order
      DB_PORT: 3306
      DB_NAME: ${ORDER_DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      TIRE_BASE_URL: http://tire-service:8080
    depends_on:
      mariadb-order:
        condition: service_healthy
      tire-service:
        condition: service_started

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: tire-ordering-api-gateway:local
    container_name: tire_api_gateway
    environment:
      AUTH_BASE_URL: http://auth-service:8080
      TIRE_BASE_URL: http://tire-service:8080
      ORDER_BASE_URL: http://order-service:8080
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - tire-service
      - order-service

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: tire-ordering-frontend:local
    container_name: tire_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  mariadb_auth_data:
  mariadb_tire_data:
  mariadb_order_data:
