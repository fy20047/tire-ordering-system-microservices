# 這份設定檔用途：
# 定義 Auth Service 的基礎執行參數（服務名稱、資料庫、JWT 參數、維運端點）。
spring:
  # 服務識別名稱：方便日誌、監控與部署時辨識服務。
  application:
    name: auth-service

  # 資料庫連線：目前先共用現有 monolith DB（Phase 2 先專注拆 Auth 邊界）。
  datasource:
    url: "jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:tire_shop}"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA 行為：開發期維持 update，避免每次啟動清空資料。
  jpa:
    hibernate:
      ddl-auto: update

# JWT 設定：
# Phase 2 初期先沿用既有欄位，後續 Step 5B 再切換到 RS256。
security:
  jwt:
    # Access Token 簽章相關參數（目前先保留現況）。
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

    # Refresh Token 與 Cookie 行為參數。
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:1209600}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

# 維運端點：
# 先開 health/info 供部署探針與基本狀態檢查使用。
management:
  endpoints:
    web:
      exposure:
        include: health,info
