services:
  # MariaDB：目前 monolith 與後續微服務共用資料來源（Phase 1 尚未拆庫）
  mariadb:
    image: mariadb:11
    container_name: tire_mariadb
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: tire_adminer
    ports:
      - "8081:8080"
    depends_on:
      - mariadb

  # 舊 monolith backend：Phase 1 仍保留業務實作，僅不再直接對外暴露 8080
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: tire-ordering-backend:local
    container_name: tire_backend
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy

  # API Gateway：Phase 1 的唯一 API 入口，先把 /api 轉發回舊 backend
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: tire-ordering-api-gateway:local
    container_name: tire_api_gateway
    environment:
      BACKEND_BASE_URL: http://backend:8080
    ports:
      - "8080:8080"
    depends_on:
      - backend

  # Frontend：只對外提供 UI，/api 請求改由 nginx 轉給 api-gateway
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: tire-ordering-frontend:local
    container_name: tire_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  mariadb_data:
