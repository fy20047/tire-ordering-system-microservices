apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  template:
    spec:
      containers:
        - name: auth-service
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_DB_NAME
            - name: JWT_EXPIRATION_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_EXPIRATION_SECONDS
            - name: JWT_REFRESH_EXPIRATION_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_REFRESH_EXPIRATION_SECONDS
            - name: JWT_REFRESH_COOKIE_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_REFRESH_COOKIE_NAME
            - name: JWT_REFRESH_COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_REFRESH_COOKIE_SECURE
            - name: JWT_REFRESH_COOKIE_SAME_SITE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_REFRESH_COOKIE_SAME_SITE
