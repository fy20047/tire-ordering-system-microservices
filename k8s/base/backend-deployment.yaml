apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels: # 生出來的 Pod 身上會貼這個標籤（跟上面的 selector 對上）
        app: backend
    spec:
      containers: # 容器設定起點
        - name: backend
          image: ghcr.io/fy20047/tire-ordering-system/backend:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secret # 把名為 app-secret 的 Secret 裡所有的 Key 全部變成環境變數
          env:
            - name: DB_HOST
              value: mariadb # mariadb 是 K8s Service 的名字，K8s 會自動轉成 IP
            - name: DB_PORT
              value: "3306"
            # 從 Secret 裡面抽特定的值出來並改名
            - name: DB_NAME # 給 Java 程式的變數名
              valueFrom:
                secretKeyRef:
                  name: db-secret # 去找 cluster 內叫 db-secret 的東西
                  key: MARIADB_DATABASE # 拿裡面叫 MARIADB_DATABASE 的值
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MARIADB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MARIADB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
