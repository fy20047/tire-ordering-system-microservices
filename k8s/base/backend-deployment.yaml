apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels: # 生出來的 Pod 身上會貼這個標籤（跟上面的 selector 對上）
        app: backend
    spec:
      containers: # 容器設定起點
        - name: backend
          image: ghcr.io/fy20047/tire-ordering-system/backend:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secret # 把名為 app-secret 的 Secret 裡所有的 Key 全部變成環境變數
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MARIADB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MARIADB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
