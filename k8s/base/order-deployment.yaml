# 這份檔案用途：
# 定義 Order Service 在 Kubernetes 的 Deployment，承接前台建單與後台訂單查改 API。
apiVersion: apps/v1
kind: Deployment
metadata:
  # 這段用途：定義 Deployment 名稱與標籤，供 Service/監控識別。
  name: order-service
  labels:
    app: order-service
spec:
  # 這段用途：先採單副本，降低 Phase 4 切流風險。
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/fy20047/tire-ordering-system/order-service:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            # 這段用途：載入 app-secret 內的 JWT key（與其他服務一致管理）。
            - secretRef:
                name: app-secret
          env:
            # 這段用途：從 db-secret 讀取 DB 帳號密碼，避免明文硬編碼。
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MARIADB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: MARIADB_PASSWORD
          readinessProbe:
            # 這段用途：用 actuator health 判斷是否可接流量。
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            # 這段用途：用 TCP 探針確認程序存活，避免假死不重啟。
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
