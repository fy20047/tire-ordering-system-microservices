spring:
  application:
    name: backend
  datasource:
    url: "jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:tire_shop}"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update # 開發階段自動建表/更新

security:
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:1209600} # 14 days
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

# 預設停用 backend 自帶 Auth 入口，避免與 auth-service 重複對外提供 login/refresh/logout。
feature:
  backend-auth-endpoints-enabled: ${BACKEND_AUTH_ENDPOINTS_ENABLED:false}
  # 預設停用 backend 自帶 Tire 入口，避免與 tire-service 重複對外提供輪胎查詢與管理 API。
  backend-tire-endpoints-enabled: ${BACKEND_TIRE_ENDPOINTS_ENABLED:false}
