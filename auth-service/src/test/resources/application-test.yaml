# 這份測試設定檔用途：
# 提供 auth-service 測試執行時的隔離環境（H2 + JWT 參數），避免依賴外部 MariaDB。
spring:
  # 這段設定用途：使用記憶體 H2 取代正式資料庫，提升測試穩定與速度。
  datasource:
    url: "jdbc:h2:mem:auth_service_test;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 這段設定用途：測試期間由 Hibernate 自動建表與清理。
  jpa:
    hibernate:
      ddl-auto: create-drop

# 這段設定用途：
# JWT key 由測試程式在啟動前動態注入，不在 repository 保存固定 private key。
security:
  jwt:
    private-key: ${TEST_JWT_PRIVATE_KEY:__injected_by_test__}
    public-key: ${TEST_JWT_PUBLIC_KEY:__injected_by_test__}
    expiration-seconds: 3600
    refresh-expiration-seconds: 1209600
    refresh-cookie-name: refreshToken
    refresh-cookie-secure: false
    refresh-cookie-same-site: Lax
