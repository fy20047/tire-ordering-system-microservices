name: CI # Workflow 名稱，顯示在 GitHub Actions 頁面

# 這段用途：定義觸發時機
on:
  push:
    branches: ["main"] # 推送到 main 時觸發（通常為 merge 後）
  pull_request:
    branches: ["main"] # PR 目標為 main 時觸發（先跑驗證）
  workflow_dispatch:   # 允許手動觸發

# 這段用途：全域環境變數（Registry 與映像命名空間）
env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: fy20047/tire-ordering-system-microservices

jobs:
  # 這段用途：建置與測試所有 Java 微服務，並在 push 時推送映像
  java-services:
    name: Java Service (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, auth-service, tire-service, order-service]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Maven Wrapper is executable
        run: chmod +x backend/mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Java Service Tests
        run: ./backend/mvnw -B -f ./${{ matrix.service }}/pom.xml test

      - name: Package Java Service
        run: ./backend/mvnw -B -DskipTests -f ./${{ matrix.service }}/pom.xml package

      # 這段用途：PR 只驗證 build；push/main 才推送映像
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Java Service image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}

  # 這段用途：前端 lint/build + 映像建置推送
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Lint
        working-directory: frontend
        run: npm run lint

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}

  # 這段用途：main push 後自動更新 minikube overlay 的映像標籤
  update-manifest:
    needs: [java-services, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Kubernetes Manifest
        run: |
          cd k8s/overlays/minikube
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAMESPACE }}/api-gateway:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAMESPACE }}/auth-service:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAMESPACE }}/tire-service:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAMESPACE }}/order-service:${{ github.sha }}
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s) ]]; then
            git add k8s/overlays/minikube/kustomization.yaml
            git commit -m "chore(ci): update microservices image tags to ${GITHUB_SHA::7} [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
