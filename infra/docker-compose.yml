services:
  # MariaDB：目前 monolith 與後續微服務共用資料來源（Phase 1 尚未拆庫）
  mariadb:
    image: mariadb:11
    container_name: tire_mariadb
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: tire_adminer
    ports:
      - "8081:8080"
    depends_on:
      - mariadb

  # 舊 monolith backend：Phase 3 起以 order 為主，Auth/Tire 入口預設停用
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: tire-ordering-backend:local
    container_name: tire_backend
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_EXPIRATION_SECONDS: ${JWT_REFRESH_EXPIRATION_SECONDS:-1209600}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refreshToken}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAME_SITE: ${JWT_REFRESH_COOKIE_SAME_SITE:-Lax}
      BACKEND_AUTH_ENDPOINTS_ENABLED: ${BACKEND_AUTH_ENDPOINTS_ENABLED:-false}
      BACKEND_TIRE_ENDPOINTS_ENABLED: ${BACKEND_TIRE_ENDPOINTS_ENABLED:-false}
      BACKEND_ORDER_ENDPOINTS_ENABLED: ${BACKEND_ORDER_ENDPOINTS_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy

  # Auth Service：Phase 2 起承接 /api/admin/login|refresh|logout
  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    image: tire-ordering-auth-service:local
    container_name: tire_auth_service
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_EXPIRATION_SECONDS: ${JWT_REFRESH_EXPIRATION_SECONDS:-1209600}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refreshToken}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAME_SITE: ${JWT_REFRESH_COOKIE_SAME_SITE:-Lax}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy

  # Tire Service：Phase 3 起承接公開與後台輪胎管理 API
  tire-service:
    build:
      context: ../tire-service
      dockerfile: Dockerfile
    image: tire-ordering-tire-service:local
    container_name: tire_tire_service
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    depends_on:
      mariadb:
        condition: service_healthy

  # Order Service：Phase 4 起承接前台建單與後台訂單查改，建單時會呼叫 tire-service 驗證商品。
  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    image: tire-ordering-order-service:local
    container_name: tire_order_service
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      TIRE_BASE_URL: http://tire-service:8080
    depends_on:
      mariadb:
        condition: service_healthy
      tire-service:
        condition: service_started

  # API Gateway：統一 API 入口，Auth/Tire/Order API 各自分流到對應服務
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: tire-ordering-api-gateway:local
    container_name: tire_api_gateway
    environment:
      AUTH_BASE_URL: http://auth-service:8080
      TIRE_BASE_URL: http://tire-service:8080
      ORDER_BASE_URL: http://order-service:8080
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - tire-service
      - order-service

  # Frontend：只對外提供 UI，/api 請求改由 nginx 轉給 api-gateway
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: tire-ordering-frontend:local
    container_name: tire_frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  mariadb_data:
