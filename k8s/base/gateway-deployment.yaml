apiVersion: apps/v1
kind: Deployment
metadata:
  # Gateway Deployment：Phase 2 持續作為統一 API 入口，Auth API 轉發到 auth-service
  name: api-gateway
  labels:
    app: api-gateway
spec:
  # 先採單副本，確保路由切換流程穩定
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/fy20047/tire-ordering-system/api-gateway:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            # 這段用途：業務 API 仍轉發到 backend（tire/order 維持在 monolith）。
            - name: BACKEND_BASE_URL
              value: http://backend:8080
            # 這段用途：Auth API（login/refresh/logout）轉發到 auth-service。
            - name: AUTH_BASE_URL
              value: http://auth-service:8080
            # 這段用途：Tire API（公開與後台輪胎管理）轉發到 tire-service。
            - name: TIRE_BASE_URL
              value: http://tire-service:8080
          readinessProbe:
            # 用 actuator health 判斷是否可接流量
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            # 先用 TCP 探測確保程序仍存活
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
