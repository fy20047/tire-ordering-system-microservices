apiVersion: apps/v1
kind: Deployment
metadata:
  # Gateway Deployment：Phase 1 先作為統一 API 入口，業務仍由 backend 處理
  name: api-gateway
  labels:
    app: api-gateway
spec:
  # 先採單副本，確保路由切換流程穩定
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/fy20047/tire-ordering-system/api-gateway:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            # Gateway 先把 /api 轉發回舊 backend service（Phase 1）
            - name: BACKEND_BASE_URL
              value: http://backend:8080
          readinessProbe:
            # 用 actuator health 判斷是否可接流量
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            # 先用 TCP 探測確保程序仍存活
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
