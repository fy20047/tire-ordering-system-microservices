apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tire-ordering
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fy20047/tire-ordering-system.git
    targetRevision: main
    path: k8s/overlays/minikube
  destination:
    server: https://kubernetes.default.svc
    namespace: tire-ordering
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
