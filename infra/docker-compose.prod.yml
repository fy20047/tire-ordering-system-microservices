services:
  mariadb:
    image: mariadb:11
    container_name: tire_mariadb
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: tire_adminer
    ports:
      - "8081:8080"
    depends_on:
      - mariadb

  backend:
    image: ghcr.io/fy20047/tire-ordering-system/backend:latest
    container_name: tire_backend
    restart: always
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_EXPIRATION_SECONDS: ${JWT_REFRESH_EXPIRATION_SECONDS:-1209600}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refreshToken}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAME_SITE: ${JWT_REFRESH_COOKIE_SAME_SITE:-Lax}
      BACKEND_AUTH_ENDPOINTS_ENABLED: ${BACKEND_AUTH_ENDPOINTS_ENABLED:-false}
      BACKEND_TIRE_ENDPOINTS_ENABLED: ${BACKEND_TIRE_ENDPOINTS_ENABLED:-false}
      BACKEND_ORDER_ENDPOINTS_ENABLED: ${BACKEND_ORDER_ENDPOINTS_ENABLED:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy

  auth-service:
    image: ghcr.io/fy20047/tire-ordering-system/auth-service:latest
    container_name: tire_auth_service
    restart: always
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_EXPIRATION_SECONDS: ${JWT_REFRESH_EXPIRATION_SECONDS:-1209600}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refreshToken}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAME_SITE: ${JWT_REFRESH_COOKIE_SAME_SITE:-Lax}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mariadb:
        condition: service_healthy

  tire-service:
    image: ghcr.io/fy20047/tire-ordering-system/tire-service:latest
    container_name: tire_tire_service
    restart: always
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    depends_on:
      mariadb:
        condition: service_healthy

  # Order Service：Phase 4 起承接前台建單與後台訂單查改。
  order-service:
    image: ghcr.io/fy20047/tire-ordering-system/order-service:latest
    container_name: tire_order_service
    restart: always
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      TIRE_BASE_URL: http://tire-service:8080
    depends_on:
      mariadb:
        condition: service_healthy
      tire-service:
        condition: service_started

  # API Gateway：統一 API 入口，Auth/Tire/Order API 各自分流到對應服務
  api-gateway:
    image: ghcr.io/fy20047/tire-ordering-system/api-gateway:latest
    container_name: tire_api_gateway
    restart: always
    environment:
      BACKEND_BASE_URL: http://backend:8080
      AUTH_BASE_URL: http://auth-service:8080
      TIRE_BASE_URL: http://tire-service:8080
      ORDER_BASE_URL: http://order-service:8080
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - auth-service
      - tire-service
      - order-service

  frontend:
    image: ghcr.io/fy20047/tire-ordering-system/frontend:latest
    container_name: tire_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  mariadb_data:
